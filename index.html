<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelDroid Mods YT | Premium Platform</title>
    
    <!-- Pre-conexión -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease; 
            overflow-x: hidden;
            background-color: #0a0c10;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .game-card { transition: all 0.3s ease; }
        img { content-visibility: auto; }

        .star-active {
            fill: #3b82f6;
            color: #3b82f6 !important;
        }

        .download-btn-premium {
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
            color: white !important;
        }
        
        .download-btn-premium:active { transform: scale(0.97); }

        #toast-msg { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { transform: translate(-50%, 20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen">

    <!-- NAVBAR -->
    <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-md border-b border-white/5 bg-[#0a0c10]/80 py-3 px-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div onclick="window.goToHome()" class="flex items-center gap-2 cursor-pointer active:scale-95 transition-transform">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i data-lucide="bolt" class="w-4 h-4 text-white"></i>
                </div>
                <h1 class="text-sm font-black tracking-tighter uppercase text-blue-600">JOELDROID</h1>
            </div>
            <div class="flex items-center gap-2">
                <a href="https://youtube.com/@joeldroidyt" target="_blank" class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase flex items-center gap-1">
                    <i data-lucide="youtube" class="w-3 h-3"></i> SUSCRIBIRSE
                </a>
                <button id="theme-toggle-btn" onclick="window.toggleTheme()" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-blue-400 transition-colors">
                    <i data-lucide="sun" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-6">
        <!-- Banner Principal -->
        <div id="home-banner" class="mb-6 p-5 rounded-3xl bg-gradient-to-br from-blue-600 to-indigo-800 text-white shadow-xl relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="font-black text-xl uppercase leading-none mb-1">Mods Exclusivos</h2>
                <p class="text-[10px] opacity-70 uppercase tracking-[0.2em] font-bold">JoelDroid Mods YT • Premium</p>
            </div>
            <i data-lucide="bolt" class="absolute -right-4 -bottom-4 opacity-10 w-32 h-32 rotate-12"></i>
        </div>

        <!-- LISTA DE JUEGOS -->
        <div id="game-list" class="space-y-4"></div>
    </main>

    <!-- DETALLE DEL JUEGO (MENU DE ESPECIACIÓN) -->
    <div id="detail-overlay" class="fixed inset-0 z-[100] bg-[#0a0c10] overflow-y-auto hidden">
        <div class="max-w-md mx-auto min-h-screen flex flex-col">
            <div class="relative h-[220px] flex flex-col items-center justify-center p-6 text-center">
                <div class="absolute inset-0 bg-gradient-to-b from-blue-500/10 to-transparent"></div>
                
                <button onclick="window.goToHome()" class="absolute top-6 left-6 w-10 h-10 rounded-xl flex items-center justify-center z-50 backdrop-blur-sm bg-white/10 text-white border border-white/5">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
                
                <button onclick="window.shareSelectedGame()" class="absolute top-6 right-6 w-10 h-10 rounded-xl flex items-center justify-center z-50 backdrop-blur-sm bg-white/10 text-white border border-white/5">
                    <i data-lucide="share-2" class="w-5 h-5"></i>
                </button>
                
                <div class="relative mb-3">
                    <img id="detail-thumb" src="" class="w-24 h-24 rounded-[32px] shadow-2xl border-4 border-white/10 object-cover z-10 relative">
                    <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-20 scale-150"></div>
                </div>
                <h3 id="detail-name" class="font-black text-xl uppercase mb-1"></h3>
                <span id="detail-version" class="text-[9px] font-black bg-blue-600 text-white px-4 py-1 rounded-full shadow-lg tracking-wider uppercase"></span>
            </div>

            <div class="px-6 space-y-5 pb-10">
                <div id="detail-info-box" class="p-5 rounded-3xl border border-white/5 bg-white/5">
                    <h4 class="text-[10px] font-black uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="rocket" class="w-3 h-3 text-blue-500"></i> Resumen del Mod:
                    </h4>
                    <div id="detail-features" class="grid grid-cols-1 gap-2"></div>
                    <div class="flex items-center justify-between p-3 rounded-2xl border border-white/5 bg-white/5 mt-4">
                        <div class="flex items-center gap-2">
                            <i data-lucide="hard-drive" class="w-3 h-3 text-amber-600"></i>
                            <span class="text-[10px] font-black uppercase text-amber-600">Peso:</span>
                        </div>
                        <span id="detail-weight" class="text-[10px] font-black px-3 py-1 rounded-lg border border-white/10"></span>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button onclick="window.startDownload('MOD 1')" class="download-btn-premium w-full flex items-center justify-between p-4 rounded-3xl border border-white/20">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full bg-white shadow-md"></div>
                            <div class="text-left">
                                <span class="block text-xs font-black uppercase">DOWNLOAD MOD 1</span>
                                <span class="text-[8px] opacity-70 font-bold uppercase">Mediafire • Principal</span>
                            </div>
                        </div>
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- SECCIÓN COMENTARIOS -->
                <div class="p-5 rounded-3xl border border-white/5 bg-white/5">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex gap-1" id="star-rating">
                            <i data-lucide="star" onclick="window.setRating(1)" class="star-icon cursor-pointer w-4 h-4 text-gray-400"></i>
                            <i data-lucide="star" onclick="window.setRating(2)" class="star-icon cursor-pointer w-4 h-4 text-gray-400"></i>
                            <i data-lucide="star" onclick="window.setRating(3)" class="star-icon cursor-pointer w-4 h-4 text-gray-400"></i>
                            <i data-lucide="star" onclick="window.setRating(4)" class="star-icon cursor-pointer w-4 h-4 text-gray-400"></i>
                            <i data-lucide="star" onclick="window.setRating(5)" class="star-icon cursor-pointer w-4 h-4 text-gray-400"></i>
                        </div>
                        <div class="text-right">
                            <div id="stat-avg" class="text-xl font-black text-blue-500">0.0</div>
                            <span id="stat-count" class="text-[8px] font-bold text-gray-400 uppercase">0 Votos</span>
                        </div>
                    </div>
                    <div id="comments-list" class="max-h-60 overflow-y-auto space-y-3 mb-4 scrollbar-hide"></div>
                    <div class="flex gap-2">
                        <input id="comment-input" type="text" placeholder="Escribir..." class="flex-grow text-[10px] p-3 rounded-2xl border border-white/10 bg-black/20">
                        <button onclick="window.sendComment()" class="w-11 h-11 rounded-2xl bg-blue-600 text-white flex items-center justify-center">
                            <i data-lucide="send" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CARGA -->
    <div id="loading-overlay" class="fixed inset-0 z-[1000] backdrop-blur-md flex flex-col items-center justify-center hidden bg-black/80">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="toast-msg" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-2xl z-[2000] hidden">
        Enlace directo copiado
    </div>

    <script>
        const gamesData = [
            { id: "global-truck", name: "Global Truck Online", thumb: "https://play-lh.googleusercontent.com/JJiHxM3IMImgKaROZ3U6yivclo5jxepBfZRShfCoxij7SrY233VKi_sp0YoxiWyHSfttjrgfYAy2vDVtYiaU5dw=w240-h480-rw", version: "V0.0.91", weight: "700 MB", desc: "Dinero infinito y camiones desbloqueados.", features: ["Dinero Infinito", "Camiones VIP"] },
            { id: "bigrigs-sim", name: "Truck Simulator Bigrigs", thumb: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQd0ALg5YipsGER2CjBhltvbsAHovUOjx2TzkSEoIAIR0RXgiu2jz-l2JE&s=10", version: "V1.5.7", weight: "1.1 GB", desc: "Simulación realista full desbloqueado.", features: ["Full Desbloqueado", "Sin Daño"] },
            { id: "trucker-europe-3", name: "Trucker of Europe 3", thumb: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1rjfLgFxiBAOozVIDrq0X6KmF92Wy56gGoj8e2ZM7Ocbw5_AQK4kpzgc&s=10", version: "V0.43.3", weight: "530 MB", desc: "Nivel máximo de conductor y garajes gratis.", features: ["Monedas Máximas", "Garajes Free"] }
        ];

        let selectedGame = null;

        window.renderGames = function() {
            const container = document.getElementById('game-list');
            container.innerHTML = gamesData.map(game => `
                <div class="game-card flex gap-3 p-3 rounded-[24px] border border-white/5 bg-[#11141b]">
                    <img src="${game.thumb}" class="w-[85px] h-[85px] object-cover rounded-2xl" alt="${game.name}">
                    <div class="flex-grow min-w-0 flex flex-col justify-between">
                        <div>
                            <h3 class="text-[12px] font-black uppercase truncate">${game.name}</h3>
                            <span class="text-[8px] font-black text-green-500">${game.version}</span>
                        </div>
                        <button onclick="window.selectGame('${game.id}')" class="w-full download-btn-premium py-2 rounded-xl text-[9px] font-black mt-2 uppercase">
                            ESPECIACIÓN
                        </button>
                    </div>
                </div>
            `).join('');
            if(window.lucide) lucide.createIcons();
        };

        // Función para cambiar de juego y actualizar URL sin error de seguridad
        window.selectGame = function(id) {
            // Recargar la página con el parámetro del mod. 
            // Esto es 100% compatible con GitHub y permite compartir URLs únicas.
            const newUrl = window.location.origin + window.location.pathname + '?mod=' + id;
            window.location.href = newUrl;
        };

        window.goToHome = function() {
            // Volver al inicio limpiando la URL
            window.location.href = window.location.origin + window.location.pathname;
        };

        window.openDetailUI = function(id) {
            selectedGame = gamesData.find(g => g.id === id);
            if(!selectedGame) return;
            
            document.getElementById('detail-name').innerText = selectedGame.name;
            document.getElementById('detail-thumb').src = selectedGame.thumb;
            document.getElementById('detail-version').innerText = selectedGame.version;
            document.getElementById('detail-weight').innerText = selectedGame.weight;
            
            document.getElementById('detail-features').innerHTML = selectedGame.features.map(f => `
                <div class="flex items-center gap-2 text-[10px] font-bold uppercase text-blue-400">
                    <i data-lucide="shield-check" class="w-3 h-3 text-green-500"></i> ${f}
                </div>
            `).join('');

            document.getElementById('detail-overlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            if(window.lucide) lucide.createIcons();
            if(window.setupFirebaseListeners) window.setupFirebaseListeners(id);
        };

        window.shareSelectedGame = function() {
            if(!selectedGame) return;
            const shareUrl = window.location.href; // La URL ya contiene el ?mod=id
            
            const copyToClipboard = () => {
                const el = document.createElement('textarea');
                el.value = shareUrl;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                const t = document.getElementById('toast-msg');
                t.classList.remove('hidden');
                setTimeout(() => t.classList.add('hidden'), 2500);
            };

            if (navigator.share) {
                navigator.share({
                    title: selectedGame.name,
                    text: `Descarga el mod de ${selectedGame.name} aquí:`,
                    url: shareUrl
                }).catch(copyToClipboard);
            } else {
                copyToClipboard();
            }
        };

        window.startDownload = function() {
            document.getElementById('loading-overlay').classList.remove('hidden');
            setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 1500);
        };

        // Lógica de detección de Mod al cargar
        window.onload = function() {
            window.renderGames();
            const urlParams = new URLSearchParams(window.location.search);
            const modId = urlParams.get('mod');
            if (modId) {
                window.openDetailUI(modId);
            }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(window.__firebase_config || '{"apiKey":"demo"}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'joeldroid-mods';
        
        let currentUser = null;

        onAuthStateChanged(auth, u => {
            currentUser = u;
        });

        signInAnonymously(auth);

        window.setupFirebaseListeners = function(gameId) {
            if(!currentUser) return;
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `comments_${gameId}`), snap => {
                const list = document.getElementById('comments-list');
                const comments = snap.docs.map(d => d.data()).sort((a,b) => (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
                list.innerHTML = comments.map(c => `
                    <div class="p-3 rounded-2xl border border-white/5 bg-[#11141b]">
                        <span class="text-[9px] font-black text-blue-500 uppercase block">User_${c.userId?.slice(0,3)}</span>
                        <p class="text-[10px] text-gray-300">${c.text}</p>
                    </div>`).join('') || '<p class="text-[9px] text-gray-500 text-center py-4">Sin comentarios</p>';
            }, () => {});

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `ratings_${gameId}`), snap => {
                const ratings = snap.docs.map(d => d.data());
                const avg = ratings.length ? (ratings.reduce((a,b)=>a+b.value,0)/ratings.length).toFixed(1) : "0.0";
                document.getElementById('stat-avg').innerText = avg;
                document.getElementById('stat-count').innerText = `${ratings.length} Votos`;
            }, () => {});
        };

        window.sendComment = async function() {
            const input = document.getElementById('comment-input');
            if(!input.value.trim() || !currentUser || !selectedGame) return;
            const text = input.value; input.value = "";
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `comments_${selectedGame.id}`), {
                    text, userId: currentUser.uid, createdAt: serverTimestamp()
                });
            } catch(e) {}
        };

        window.setRating = async function(val) {
            if(!currentUser || !selectedGame) return;
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `ratings_${selectedGame.id}`, currentUser.uid), {
                    value: val, userId: currentUser.uid, updatedAt: serverTimestamp()
                });
            } catch(e) {}
        };
    </script>
</body>
</html>
