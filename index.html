<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelDroid Mods YT | Premium Platform</title>
    
    <!-- Optimizaciones de Conexión Crítica -->
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s ease; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .scrollbar-hide::-webkit-scrollbar { 
            display: none; 
        }

        /* Optimización de Renderizado */
        img { 
            content-visibility: auto; 
        }

        /* Esqueleto de carga preventivo (opcional, invisible por diseño) */
        .game-card-skeleton {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>

    <!-- Firebase SDKs & Lógica del Sitio -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración segura de Firebase
        let firebaseConfig;
        try {
            firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
                apiKey: "",
                authDomain: "joeldroid-mods.firebaseapp.com",
                projectId: "joeldroid-mods",
                storageBucket: "joeldroid-mods.appspot.com",
                messagingSenderId: "",
                appId: ""
            };
        } catch (e) {
            firebaseConfig = { projectId: "joeldroid-mods" };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'joeldroid-mods-yt';

        const gamesData = [
            {
                id: "global-truck",
                name: "Global Truck Online",
                thumb: "https://play-lh.googleusercontent.com/JJiHxM3IMImgKaROZ3U6yivclo5jxepBfZRShfCoxij7SrY233VKi_sp0YoxiWyHSfttjrgfYAy2vDVtYiaU5dw=w240-h480-rw",
                version: "V0.0.91",
                weight: "700 MB",
                desc: "Dinero infinito, camiones premium desbloqueados y personalización total.",
                features: ["Dinero Infinito", "Camiones VIP", "Sin Publicidad"]
            },
            {
                id: "bigrigs-sim",
                name: "Truck Simulator Bigrigs",
                thumb: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQd0ALg5YipsGER2CjBhltvbsAHovUOjx2TzkSEoIAIR0RXgiu2jz-l2JE&s=10",
                version: "V1.5.7",
                weight: "1.1 GB",
                desc: "Simulación realista sin anuncios y con todas las rutas abiertas.",
                features: ["Full Desbloqueado", "Tanque Infinito", "Rutas Pro"]
            },
            {
                id: "trucker-europe-3",
                name: "Trucker of Europe 3",
                thumb: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1rjfLgFxiBAOozVIDrq0X6KmF92Wy56gGoj8e2ZM7Ocbw5_AQK4kpzgc&s=10",
                version: "V0.43.3",
                weight: "530 MB",
                desc: "Nivel máximo de conductor y garajes gratis en toda Europa.",
                features: ["Monedas Máximas", "Sin Daño", "Garajes Free"]
            }
        ];

        let currentUser = null;
        let selectedGame = null;
        let darkMode = true;
        let commentsUnsubscribe = null;
        let statsUnsubscribe = null;
        let currentComments = [];

        // Inicialización rápida
        const init = async () => {
            onAuthStateChanged(auth, (u) => {
                currentUser = u;
                if (!u) handleAuth();
            });
            await handleAuth();
            renderGames();
            
            const urlParams = new URLSearchParams(window.location.search);
            const gameId = urlParams.get('g');
            if (gameId && gamesData.find(g => g.id === gameId)) {
                window.openDetail(gameId);
            }
            if (window.lucide) lucide.createIcons();
        };

        async function handleAuth() {
            try {
                if (window.__initial_auth_token) await signInWithCustomToken(auth, window.__initial_auth_token);
                else await signInAnonymously(auth);
            } catch (err) { console.warn("Auth fail", err); }
        }

        function renderGames() {
            const container = document.getElementById('game-list');
            if (!container) return;
            container.innerHTML = gamesData.map(game => `
                <div class="flex gap-3 p-3 rounded-[24px] border transition-all shadow-md ${darkMode ? 'bg-[#11141b] border-white/5' : 'bg-white border-black/5'}">
                    <div class="relative flex-shrink-0">
                        <img src="${game.thumb}" 
                             loading="lazy" 
                             decoding="async"
                             class="w-[85px] h-[85px] object-cover rounded-2xl bg-gray-800" 
                             alt="${game.name}">
                        <span class="absolute -top-1 -right-1 bg-green-500 text-white text-[6px] font-black px-1.5 py-0.5 rounded shadow-lg border border-white/20 uppercase">UPDATE</span>
                        <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 bg-red-600 text-white text-[7px] font-black px-2 py-0.5 rounded-md whitespace-nowrap shadow-lg border border-white/10 uppercase">MOD APK</span>
                    </div>
                    <div class="flex-grow min-w-0 flex flex-col justify-between">
                        <div class="flex justify-between items-start">
                            <div class="min-w-0">
                                <h3 class="text-[12px] font-black uppercase truncate pr-2 ${darkMode ? 'text-white' : 'text-gray-800'}">${game.name}</h3>
                                <span class="text-[8px] font-black bg-green-500/10 text-green-500 px-2 py-0.5 rounded border border-green-500/20">${game.version}</span>
                            </div>
                            <button onclick="window.shareGame('${game.id}', '${game.name}')" class="p-2 rounded-xl transition-transform active:scale-90 ${darkMode ? 'bg-white/5 text-blue-500' : 'bg-gray-100 text-blue-600'}">
                                <i data-lucide="share-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                        <p class="text-[10px] leading-tight line-clamp-2 ${darkMode ? 'text-gray-400' : 'text-gray-500'}">${game.desc}</p>
                        <button onclick="window.openDetail('${game.id}')" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-2 rounded-xl text-[9px] font-black uppercase shadow-lg shadow-blue-600/20 active:scale-95 transition-transform mt-2">
                            DOWNLOAD MOD APK
                        </button>
                    </div>
                </div>
            `).join('');
            if (window.lucide) lucide.createIcons();
        }

        window.shareGame = async function(gameId, gameName) {
            const baseUrl = window.location.origin + window.location.pathname;
            const shareUrl = `${baseUrl}?g=${gameId}`;
            const shareData = { title: `JoelDroid - ${gameName}`, text: `🔥 Mod APK: ${gameName} - JoelDroid Mods YT`, url: shareUrl };
            try {
                if (navigator.share) await navigator.share(shareData);
                else {
                    const el = document.createElement('textarea'); el.value = shareUrl; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                    const toast = document.getElementById('toast-msg'); if (toast) { toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 2000); }
                }
            } catch (err) { console.warn('Share error', err); }
        };

        window.openDetail = function(gameId) {
            selectedGame = gamesData.find(g => g.id === gameId);
            if (!selectedGame) return;
            updateDetailUI();
            const overlay = document.getElementById('detail-overlay');
            if (overlay) overlay.classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
            setupFirebaseListeners(gameId);
            if (window.lucide) lucide.createIcons();
        };

        function updateDetailUI() {
            if (!selectedGame) return;
            const overlay = document.getElementById('detail-overlay');
            if (!overlay) return;

            overlay.className = `fixed inset-0 z-[100] overflow-y-auto ${darkMode ? 'bg-[#0a0c10]' : 'bg-gray-50'}`;
            
            document.getElementById('detail-name').innerText = selectedGame.name;
            document.getElementById('detail-name').className = `font-black text-xl uppercase mb-1 ${darkMode ? 'text-white' : 'text-gray-900'}`;
            document.getElementById('detail-version').innerText = `VERSION ${selectedGame.version}`;
            document.getElementById('detail-thumb').src = selectedGame.thumb;
            document.getElementById('detail-weight').innerText = selectedGame.weight;
            
            const backBtn = document.getElementById('detail-back-btn');
            const shareBtn = document.getElementById('detail-share-btn');
            const topBtnClasses = `absolute top-6 w-10 h-10 rounded-xl flex items-center justify-center z-50 backdrop-blur-sm transition-all ${darkMode ? 'bg-white/10 text-white' : 'bg-black/10 text-gray-800 active:bg-black/20'}`;
            backBtn.className = `${topBtnClasses} left-6`;
            shareBtn.className = `${topBtnClasses} right-6`;

            const featuresList = document.getElementById('detail-features');
            featuresList.innerHTML = selectedGame.features.map(f => `
                <div class="flex items-center gap-2 text-[10px] font-bold uppercase ${darkMode ? 'text-blue-400' : 'text-blue-600'}">
                    <i data-lucide="shield-check" class="w-3 h-3 text-green-500"></i> ${f}
                </div>
            `).join('');

            const infoBox = document.getElementById('detail-info-box');
            infoBox.className = `p-5 rounded-3xl border transition-all flex flex-col gap-4 ${darkMode ? 'border-white/5 bg-white/5 text-blue-400' : 'border-black/5 bg-white shadow-sm text-blue-700'}`;
            
            const weightSection = document.getElementById('weight-section');
            weightSection.className = `p-3 rounded-2xl flex items-center justify-between border ${darkMode ? 'bg-white/5 border-white/5' : 'bg-gray-50 border-black/5'}`;

            const detailContainer = document.getElementById('detail-main-container');
            detailContainer.className = `px-6 space-y-5 pb-10 ${darkMode ? 'text-gray-100' : 'text-gray-800'}`;
            
            const commentBox = document.getElementById('comment-section-box');
            commentBox.className = `p-5 rounded-3xl border ${darkMode ? 'border-white/5 bg-white/5' : 'border-black/5 bg-white shadow-sm'}`;
            
            const commentInput = document.getElementById('comment-input');
            commentInput.className = `flex-grow text-[10px] p-3 rounded-2xl outline-none border ${darkMode ? 'border-white/10 bg-[#0a0c10] text-white focus:border-blue-500' : 'border-black/10 bg-gray-50 text-gray-900 focus:border-blue-600'}`;
            
            document.querySelectorAll('.download-btn').forEach(btn => {
                btn.className = `download-btn w-full flex items-center justify-between p-4 rounded-3xl border transition-colors ${darkMode ? 'border-white/5 bg-white/5' : 'border-black/5 bg-white shadow-sm'}`;
                const title = btn.querySelector('.btn-title');
                if (title) title.className = `btn-title block text-xs font-black uppercase ${darkMode ? 'text-white' : 'text-gray-900'}`;
            });

            shareBtn.onclick = () => window.shareGame(selectedGame.id, selectedGame.name);
            renderComments(currentComments);
        }

        window.closeDetail = function() {
            const overlay = document.getElementById('detail-overlay');
            if (overlay) overlay.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
            selectedGame = null;
            currentComments = [];
            if (commentsUnsubscribe) { commentsUnsubscribe(); commentsUnsubscribe = null; }
            if (statsUnsubscribe) { statsUnsubscribe(); statsUnsubscribe = null; }
        };

        function setupFirebaseListeners(gameId) {
            if (!auth.currentUser) return;
            const commentsCol = collection(db, 'artifacts', appId, 'public', 'data', `comments_${gameId}`);
            commentsUnsubscribe = onSnapshot(commentsCol, (snapshot) => {
                currentComments = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                renderComments(currentComments);
            }, (err) => console.warn("Fire fail", err));

            const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'game_stats', gameId);
            statsUnsubscribe = onSnapshot(statsRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const avgElem = document.getElementById('stat-avg');
                    const countElem = document.getElementById('stat-count');
                    if (avgElem) avgElem.innerText = data.average || "5.0";
                    if (countElem) countElem.innerText = `${data.count || 0} Votos`;
                    updateStars(data.average || 5);
                }
            }, (err) => console.warn("Stat fail", err));
        }

        function renderComments(comments) {
            const container = document.getElementById('comments-list');
            if (!container) return;
            if (comments.length === 0) {
                container.innerHTML = `<p class="text-[9px] text-gray-500 italic text-center py-4">Sé el primero en comentar...</p>`;
                return;
            }
            container.innerHTML = comments.map(c => `
                <div class="p-3 rounded-2xl border shadow-sm ${darkMode ? 'bg-[#11141b] border-white/5' : 'bg-white border-black/5'}">
                    <span class="text-[9px] font-black text-blue-500 uppercase block mb-1">${c.userName || 'Usuario'}</span>
                    <p class="text-[10px] leading-relaxed font-medium ${darkMode ? 'text-gray-300' : 'text-gray-700'}">${c.text}</p>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        window.sendComment = async function() {
            const input = document.getElementById('comment-input');
            if (!input || !input.value.trim() || !auth.currentUser || !selectedGame) return;
            const text = input.value.trim(); input.value = "";
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `comments_${selectedGame.id}`), {
                    text, userId: auth.currentUser.uid, userName: `User_${auth.currentUser.uid.substring(0, 5)}`, createdAt: serverTimestamp()
                });
            } catch (e) { input.value = text; console.error("Comment error", e); }
        };

        window.toggleTheme = function() {
            darkMode = !darkMode;
            document.body.className = `${darkMode ? 'bg-[#0a0c10] text-gray-100' : 'bg-gray-50 text-gray-900'} min-h-screen`;
            const nav = document.querySelector('nav');
            if (nav) nav.className = `sticky top-0 z-50 backdrop-blur-md border-b py-3 px-4 ${darkMode ? 'border-white/5 bg-[#0a0c10]/80' : 'border-black/5 bg-white/80'}`;
            const footer = document.querySelector('footer');
            if (footer) footer.className = `py-10 px-4 border-t text-center ${darkMode ? 'border-white/5 bg-[#0a0c10]' : 'border-black/5 bg-gray-100'}`;
            renderGames();
            const themeBtn = document.getElementById('theme-toggle-btn');
            if (themeBtn) {
                themeBtn.className = `w-8 h-8 rounded-lg flex items-center justify-center transition-colors ${darkMode ? 'bg-white/5 text-blue-400' : 'bg-gray-200 text-blue-600'}`;
                themeBtn.innerHTML = darkMode ? '<i data-lucide="sun" class="w-4 h-4"></i>' : '<i data-lucide="moon" class="w-4 h-4"></i>';
            }
            if (selectedGame) updateDetailUI();
            if (window.lucide) lucide.createIcons();
        };

        window.startDownload = function(label) {
            const loader = document.getElementById('loading-overlay');
            const msg = document.getElementById('loading-msg');
            if (msg) msg.innerText = `Generando enlace de ${label}`;
            if (loader) {
                loader.className = `fixed inset-0 z-[1000] backdrop-blur-md flex flex-col items-center justify-center p-10 ${darkMode ? 'bg-black/80' : 'bg-white/80'}`;
                loader.classList.remove('hidden'); setTimeout(() => loader.classList.add('hidden'), 2500);
            }
        };

        function updateStars(avg) {
            const stars = document.querySelectorAll('.star-icon');
            stars.forEach((s, i) => {
                if (i < Math.round(avg)) { s.classList.add('fill-amber-500', 'text-amber-500'); s.classList.remove('text-gray-400'); }
                else { s.classList.remove('fill-amber-500', 'text-amber-500'); s.classList.add('text-gray-400'); }
            });
        }

        // Carga inicial optimizada al finalizar el DOM
        window.addEventListener('DOMContentLoaded', init);
    </script>
</head>
<body class="bg-[#0a0c10] text-gray-100 min-h-screen">

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-50 backdrop-blur-md border-b border-white/5 bg-[#0a0c10]/80 py-3 px-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i data-lucide="bolt" class="w-4 h-4 text-white"></i>
                </div>
                <h1 class="text-sm font-black tracking-tighter uppercase text-blue-600">JOELDROID</h1>
            </div>
            <div class="flex items-center gap-2">
                <a href="https://youtube.com/@joeldroidyt" target="_blank" class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase flex items-center gap-1">
                    <i data-lucide="youtube" class="w-3 h-3"></i> SUSCRIBIRSE
                </a>
                <button id="theme-toggle-btn" onclick="toggleTheme()" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-blue-400 transition-colors">
                    <i data-lucide="sun" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-6">
        <!-- Banner -->
        <div class="mb-6 p-5 rounded-3xl bg-gradient-to-br from-blue-600 to-indigo-800 text-white shadow-xl relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="font-black text-xl uppercase leading-none mb-1">Mods Exclusivos</h2>
                <p class="text-[10px] opacity-70 uppercase tracking-[0.2em] font-bold">JoelDroid Mods YT • Premium</p>
            </div>
            <i data-lucide="bolt" class="absolute -right-4 -bottom-4 opacity-10 w-32 h-32 rotate-12"></i>
        </div>
        
        <!-- Lista de Juegos -->
        <div id="game-list" class="space-y-4">
            <!-- Los juegos se inyectan vía JS para asegurar carga paralela -->
        </div>
    </main>

    <!-- DETALLE DEL JUEGO (MODAL) -->
    <div id="detail-overlay" class="fixed inset-0 z-[100] bg-[#0a0c10] overflow-y-auto hidden">
        <div class="max-w-md mx-auto min-h-screen flex flex-col">
            <div class="relative h-[220px] flex flex-col items-center justify-center p-6 text-center">
                <div class="absolute inset-0 bg-gradient-to-b from-blue-500/10 to-transparent"></div>
                <button id="detail-back-btn" onclick="closeDetail()" class="absolute top-6 left-6 w-10 h-10 rounded-xl flex items-center justify-center z-50 backdrop-blur-sm">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
                <button id="detail-share-btn" class="absolute top-6 right-6 w-10 h-10 rounded-xl flex items-center justify-center z-50 backdrop-blur-sm">
                    <i data-lucide="share-2" class="w-5 h-5"></i>
                </button>
                <div class="relative mb-3">
                    <img id="detail-thumb" src="" class="w-24 h-24 rounded-[32px] shadow-2xl border-4 border-white/10 object-cover z-10 relative bg-gray-800">
                    <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-20 scale-150"></div>
                </div>
                <h3 id="detail-name" class="font-black text-xl uppercase mb-1"></h3>
                <span id="detail-version" class="text-[9px] font-black bg-blue-600 text-white px-4 py-1 rounded-full shadow-lg tracking-wider uppercase"></span>
            </div>

            <div id="detail-main-container" class="px-6 space-y-5 pb-10">
                <div id="detail-info-box" class="p-5 rounded-3xl border">
                    <div>
                        <h4 class="text-[10px] font-black uppercase mb-3 flex items-center gap-2"><i data-lucide="rocket" class="w-3 h-3 text-blue-500"></i> Resumen del Mod:</h4>
                        <div id="detail-features" class="grid grid-cols-1 gap-2"></div>
                    </div>
                    
                    <div id="weight-section" class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i data-lucide="hard-drive" class="w-3 h-3 text-amber-600"></i>
                            <span class="text-[10px] font-black uppercase text-amber-600">Resumen de Peso:</span>
                        </div>
                        <span id="detail-weight" class="text-[10px] font-black px-3 py-1 rounded-lg bg-amber-500/15 text-amber-600 border border-amber-500/10"></span>
                    </div>
                </div>

                <!-- Botones de Descarga -->
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="startDownload('MOD 1')" class="download-btn">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
                            <div class="text-left">
                                <span class="btn-title">DOWNLOAD MOD 1</span>
                                <span class="text-[8px] text-gray-500 font-bold uppercase">Mediafire • Principal</span>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-blue-500"></i>
                    </button>
                    <button onclick="startDownload('MOD 2')" class="download-btn">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                            <div class="text-left">
                                <span class="btn-title">DOWNLOAD MOD 2</span>
                                <span class="text-[8px] text-gray-500 font-bold uppercase">Mediafire • Espejo</span>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-blue-500"></i>
                    </button>
                </div>

                <!-- Sección de Comentarios -->
                <div id="comment-section-box" class="p-5 rounded-3xl border">
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <span class="text-[9px] font-black text-gray-500 uppercase block mb-1">Puntuación</span>
                            <div class="flex gap-1" id="star-rating">
                                <i data-lucide="star" class="star-icon w-3.5 h-3.5 text-gray-400"></i>
                                <i data-lucide="star" class="star-icon w-3.5 h-3.5 text-gray-400"></i>
                                <i data-lucide="star" class="star-icon w-3.5 h-3.5 text-gray-400"></i>
                                <i data-lucide="star" class="star-icon w-3.5 h-3.5 text-gray-400"></i>
                                <i data-lucide="star" class="star-icon w-3.5 h-3.5 text-gray-400"></i>
                            </div>
                        </div>
                        <div class="text-right">
                            <div id="stat-avg" class="text-xl font-black leading-none text-blue-500">5.0</div>
                            <span id="stat-count" class="text-[8px] font-bold text-gray-400 uppercase">0 Votos</span>
                        </div>
                    </div>
                    <div id="comments-list" class="max-h-60 overflow-y-auto space-y-3 pr-2 scrollbar-hide mb-4"></div>
                    <div class="flex gap-2">
                        <input id="comment-input" type="text" placeholder="Escribe un comentario..." autocomplete="off">
                        <button onclick="sendComment()" class="w-11 h-11 rounded-2xl bg-blue-600 text-white flex items-center justify-center shadow-lg shadow-blue-600/20">
                            <i data-lucide="send" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CARGA DE ACCIÓN -->
    <div id="loading-overlay" class="fixed inset-0 z-[1000] backdrop-blur-md flex flex-col items-center justify-center p-10 hidden">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h3 id="loading-msg" class="font-black uppercase text-[10px] tracking-widest text-white"></h3>
        <p class="text-blue-600 text-[8px] font-black animate-pulse mt-2 uppercase">Conexión Premium Establecida</p>
    </div>

    <!-- Toast Notification -->
    <div id="toast-msg" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-2xl z-[2000] hidden">
        Enlace copiado al portapapeles
    </div>

    <!-- FOOTER -->
    <footer class="py-10 px-4 border-t border-white/5 bg-[#0a0c10] text-center">
        <div class="flex flex-col items-center gap-3">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded-md flex items-center justify-center bg-blue-600">
                    <i data-lucide="bolt" class="w-3 h-3 text-white"></i>
                </div>
                <span class="text-[10px] font-black uppercase tracking-widest text-blue-600">JOELDROID MODS</span>
            </div>
            <p class="text-[9px] font-bold text-gray-500 uppercase max-w-[200px] leading-relaxed mx-auto">&copy; 2019 - 2026 JOELDROID YT.</p>
        </div>
    </footer>
</body>
</html>
