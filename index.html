<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelDroid Mods YT | Premium Platform</title>
    
    <!-- Pre-conexión -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://unpkg.com">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --bg-color: #020408;
            --card-bg: rgba(13, 17, 23, 0.95);
            --text-main: #ffffff;
            --text-title: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(59, 130, 246, 0.3);
            --nav-bg: transparent;
            --overlay-bg: #020408;
            --neon-glow: 0.5;
            --brand-color: #3b82f6;
            --neon-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            --premium-gradient: linear-gradient(to bottom right, #1d4ed8, #1e3a8a);
            --detail-name-color: #ffffff;
            --detail-name-shadow: 0 2px 10px rgba(255, 255, 255, 0.2);
            --warning-bg: rgba(245, 158, 11, 0.1);
            --warning-text: #f59e0b;
            --toast-bg: #10b981;
            --toast-text: #ffffff;
            --search-bg: rgba(255, 255, 255, 0.05);
            --btn-neon-active: rgba(59, 130, 246, 0.2);
        }

        .light-mode {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-title: #1d4ed8;
            --text-muted: #475569;
            --border-color: rgba(37, 99, 235, 0.2);
            --nav-bg: transparent;
            --overlay-bg: #f8fafc;
            --neon-glow: 0.3;
            --brand-color: #2563eb;
            --neon-shadow: 0 0 12px rgba(37, 99, 235, 0.2);
            --premium-gradient: linear-gradient(to bottom right, #2563eb, #1e40af);
            --detail-name-color: #1e3a8a; 
            --detail-name-shadow: none;
            --warning-bg: rgba(217, 119, 6, 0.08);
            --warning-text: #b45309;
            --toast-bg: #059669;
            --toast-text: #ffffff;
            --search-bg: rgba(0, 0, 0, 0.05);
            --btn-neon-active: rgba(37, 99, 235, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.4s ease, color 0.4s ease; 
            overflow-x: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* FONDO DE FORMAS NEÓN */
        .neon-background, .neon-background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .neon-shape {
            position: absolute;
            opacity: 0;
            animation: floatNeon 20s infinite linear;
            pointer-events: none;
        }

        .neon-shape.square { border: 2.5px solid; border-radius: 8px; }
        .neon-shape.circle { border: 2.5px solid; border-radius: 50%; }
        .neon-shape.hexagon {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            border: 2.5px solid;
            background: transparent;
        }

        @keyframes floatNeon {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: var(--neon-glow); }
            90% { opacity: var(--neon-glow); }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* ENCABEZADO FIJO PERMANENTE */
        .nav-header { 
            background-color: transparent; 
            border-bottom: 1px solid transparent; 
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 110;
            transition: background-color 0.3s ease, backdrop-filter 0.3s ease, border-color 0.3s ease, padding 0.3s ease;
        }

        .nav-header.scrolled {
            background-color: rgba(2, 4, 8, 0.7);
            backdrop-filter: blur(12px);
            border-color: var(--border-color);
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }
        
        .light-mode .nav-header.scrolled {
            background-color: rgba(248, 250, 252, 0.75);
        }

        .brand-text {
            color: var(--brand-color);
            text-shadow: var(--neon-shadow);
        }
        
        .game-card { 
            background-color: var(--card-bg); 
            border: 2px solid var(--border-color); 
            box-shadow: var(--neon-shadow);
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .btn-download-premium {
            background: var(--premium-gradient);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px -5px rgba(29, 78, 216, 0.5);
        }

        .mod-badge { 
            background: #ef4444; 
            color: white; 
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.8); 
            font-size: 9px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 8px;
            z-index: 30;
            border: 1.5px solid rgba(255,255,255,0.3);
            line-height: 1;
            white-space: nowrap;
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .update-badge { 
            background: #10b981; 
            color: white; 
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.7); 
            font-size: 8px;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 6px;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.2);
            line-height: 1;
            position: absolute;
            top: -4px;
            right: -4px;
        }

        .search-container {
            background: var(--search-bg);
            border: 2px solid var(--border-color);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .filter-btn {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.1em;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px 14px;
            border-radius: 15px;
            border: 2px solid transparent;
            color: var(--text-muted);
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        .filter-btn.active {
            color: var(--brand-color);
            background: var(--btn-neon-active);
            border-color: var(--brand-color);
            box-shadow: var(--neon-shadow), inset 0 0 10px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        #detail-overlay { 
            background-color: var(--overlay-bg); 
            color: var(--text-main); 
        }

        #detail-name {
            color: var(--detail-name-color);
            transition: color 0.4s ease;
            text-shadow: var(--detail-name-shadow);
        }

        .box-premium { 
            background-color: var(--card-bg); 
            border: 2px solid var(--border-color);
            box-shadow: var(--neon-shadow);
        }

        .warning-box {
            background-color: var(--warning-bg);
            border-left: 4px solid var(--warning-text);
            color: var(--warning-text);
            font-size: 10px;
            line-height: 1.4;
            font-weight: 600;
            border-radius: 12px;
        }

        .btn-subtext {
            font-size: 8px;
            font-weight: 700;
            opacity: 0.8;
            display: block;
            margin-top: -2px;
            letter-spacing: 0.05em;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--toast-bg);
            color: var(--toast-text);
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            z-index: 200;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.4s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
