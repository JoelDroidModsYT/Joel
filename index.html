<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelDroid Mods YT | Premium Platform</title>
    
    <!-- Pre-conexión para velocidad máxima -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons (Carga prioritaria) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s ease; 
            overflow-x: hidden;
            background-color: #0a0c10;
        }

        .scrollbar-hide::-webkit-scrollbar { 
            display: none; 
        }

        /* Mejora de suavidad en transiciones */
        .game-card {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Evitar saltos de contenido (Layout Shift) */
        img { content-visibility: auto; }
    </style>
</head>
<body class="text-gray-100 min-h-screen">

    <!-- NAVBAR -->
    <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-md border-b border-white/5 bg-[#0a0c10]/80 py-3 px-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i data-lucide="bolt" class="w-4 h-4 text-white"></i>
                </div>
                <h1 class="text-sm font-black tracking-tighter uppercase text-blue-600">JOELDROID</h1>
            </div>
            <div class="flex items-center gap-2">
                <a href="https://youtube.com/@joeldroidyt" target="_blank" class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase flex items-center gap-1">
                    <i data-lucide="youtube" class="w-3 h-3"></i> SUSCRIBIRSE
                </a>
                <button id="theme-toggle-btn" onclick="window.toggleTheme()" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-blue-400 transition-colors">
                    <i data-lucide="sun" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-6">
        <!-- Banner Principal -->
        <div class="mb-6 p-5 rounded-3xl bg-gradient-to-br from-blue-600 to-indigo-800 text-white shadow-xl relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="font-black text-xl uppercase leading-none mb-1">Mods Exclusivos</h2>
                <p class="text-[10px] opacity-70 uppercase tracking-[0.2em] font-bold">JoelDroid Mods YT • Premium</p>
            </div>
            <i data-lucide="bolt" class="absolute -right-4 -bottom-4 opacity-10 w-32 h-32 rotate-12"></i>
        </div>

        <!-- LISTA DE JUEGOS (Renderizado Inmediato) -->
        <div id="game-list" class="space-y-4">
            <!-- Se inyectará inmediatamente por el script inferior -->
        </div>
    </main>

    <!-- DETALLE DEL JUEGO -->
    <div id="detail-overlay" class="fixed inset-0 z-[100] bg-[#0a0c10] overflow-y-auto hidden">
        <div class="max-w-md mx-auto min-h-screen flex flex-col">
            <div class="relative h-[220px] flex flex-col items-center justify-center p-6 text-center">
                <div class="absolute inset-0 bg-gradient-to-b from-blue-500/10 to-transparent"></div>
                <button id="detail-back-btn" onclick="window.closeDetail()" class="absolute top-6 left-6 w-10 h-10 rounded-xl flex items-center justify-center z-50 backdrop-blur-sm bg-white/10 text-white">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
                <button id="detail-share-btn" class="absolute top-6 right-6 w-10 h-10 rounded-xl flex items-center justify-center z-50 backdrop-blur-sm bg-white/10 text-white">
                    <i data-lucide="share-2" class="w-5 h-5"></i>
                </button>
                <div class="relative mb-3">
                    <img id="detail-thumb" src="" class="w-24 h-24 rounded-[32px] shadow-2xl border-4 border-white/10 object-cover z-10 relative">
                    <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-20 scale-150"></div>
                </div>
                <h3 id="detail-name" class="font-black text-xl uppercase mb-1 text-white"></h3>
                <span id="detail-version" class="text-[9px] font-black bg-blue-600 text-white px-4 py-1 rounded-full shadow-lg tracking-wider uppercase"></span>
            </div>

            <div id="detail-main-container" class="px-6 space-y-5 pb-10">
                <div id="detail-info-box" class="p-5 rounded-3xl border border-white/5 bg-white/5 text-blue-400">
                    <div>
                        <h4 class="text-[10px] font-black uppercase mb-3 flex items-center gap-2"><i data-lucide="rocket" class="w-3 h-3 text-blue-500"></i> Resumen del Mod:</h4>
                        <div id="detail-features" class="grid grid-cols-1 gap-2"></div>
                    </div>
                    <div id="weight-section" class="flex items-center justify-between p-3 rounded-2xl bg-white/5 border border-white/5">
                        <div class="flex items-center gap-2">
                            <i data-lucide="hard-drive" class="w-3 h-3 text-amber-600"></i>
                            <span class="text-[10px] font-black uppercase text-amber-600">Resumen de Peso:</span>
                        </div>
                        <span id="detail-weight" class="text-[10px] font-black px-3 py-1 rounded-lg bg-amber-500/15 text-amber-600 border border-amber-500/10"></span>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button onclick="window.startDownload('MOD 1')" class="download-btn w-full flex items-center justify-between p-4 rounded-3xl border border-white/5 bg-white/5">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
                            <div class="text-left">
                                <span class="btn-title block text-xs font-black uppercase text-white">DOWNLOAD MOD 1</span>
                                <span class="text-[8px] text-gray-500 font-bold uppercase">Mediafire • Principal</span>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-blue-500"></i>
                    </button>
                    <button onclick="window.startDownload('MOD 2')" class="download-btn w-full flex items-center justify-between p-4 rounded-3xl border border-white/5 bg-white/5">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                            <div class="text-left">
                                <span class="btn-title block text-xs font-black uppercase text-white">DOWNLOAD MOD 2</span>
                                <span class="text-[8px] text-gray-500 font-bold uppercase">Mediafire • Espejo</span>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-blue-500"></i>
                    </button>
                </div>

                <div id="comment-section-box" class="p-5 rounded-3xl border border-white/5 bg-white/5">
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <span class="text-[9px] font-black text-gray-500 uppercase block mb-1">Puntuación</span>
                            <div class="flex gap-1" id="star-rating">
                                <i data-lucide="star" class="star-icon w-3.5 h-3.5 text-gray-400"></i>
                                <i data-lucide="star" class="star-icon w-3.5 h-3.5 text-gray-400"></i>
                                <i data-lucide="star" class="star-icon w-3.5 h-3.5 text-gray-400"></i>
                                <i data-lucide="star" class="star-icon w-3.5 h-3.5 text-gray-400"></i>
                                <i data-lucide="star" class="star-icon w-3.5 h-3.5 text-gray-400"></i>
                            </div>
                        </div>
                        <div class="text-right">
                            <div id="stat-avg" class="text-xl font-black leading-none text-blue-500">5.0</div>
                            <span id="stat-count" class="text-[8px] font-bold text-gray-400 uppercase">0 Votos</span>
                        </div>
                    </div>
                    <div id="comments-list" class="max-h-60 overflow-y-auto space-y-3 pr-2 scrollbar-hide mb-4"></div>
                    <div class="flex gap-2">
                        <input id="comment-input" type="text" placeholder="Escribe un comentario..." class="flex-grow text-[10px] p-3 rounded-2xl outline-none border border-white/10 bg-[#0a0c10] text-white focus:border-blue-500">
                        <button onclick="window.sendComment()" class="w-11 h-11 rounded-2xl bg-blue-600 text-white flex items-center justify-center shadow-lg shadow-blue-600/20 active:scale-90 transition-transform">
                            <i data-lucide="send" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CARGA -->
    <div id="loading-overlay" class="fixed inset-0 z-[1000] backdrop-blur-md flex flex-col items-center justify-center p-10 hidden bg-black/80">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h3 id="loading-msg" class="font-black uppercase text-[10px] tracking-widest text-white"></h3>
        <p class="text-blue-600 text-[8px] font-black animate-pulse mt-2 uppercase">Conexión Premium Establecida</p>
    </div>

    <div id="toast-msg" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-2xl z-[2000] hidden">
        Enlace copiado al portapapeles
    </div>

    <footer id="main-footer" class="py-10 px-4 border-t border-white/5 bg-[#0a0c10] text-center">
        <div class="flex flex-col items-center gap-3">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded-md flex items-center justify-center bg-blue-600">
                    <i data-lucide="bolt" class="w-3 h-3 text-white"></i>
                </div>
                <span class="text-[10px] font-black uppercase tracking-widest text-blue-600">JOELDROID MODS</span>
            </div>
            <p class="text-[9px] font-bold text-gray-500 uppercase max-w-[200px] leading-relaxed mx-auto">&copy; 2019 - 2026 JOELDROID YT.</p>
        </div>
    </footer>

    <!-- LOGICA DE CONTROL (Scripts Sincronizados) -->
    <script>
        // CONFIGURACIÓN GLOBAL Y DATOS
        const gamesData = [
            { id: "global-truck", name: "Global Truck Online", thumb: "https://play-lh.googleusercontent.com/JJiHxM3IMImgKaROZ3U6yivclo5jxepBfZRShfCoxij7SrY233VKi_sp0YoxiWyHSfttjrgfYAy2vDVtYiaU5dw=w240-h480-rw", version: "V0.0.91", weight: "700 MB", desc: "Dinero infinito, camiones premium desbloqueados y personalización total.", features: ["Dinero Infinito", "Camiones VIP", "Sin Publicidad"] },
            { id: "bigrigs-sim", name: "Truck Simulator Bigrigs", thumb: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQd0ALg5YipsGER2CjBhltvbsAHovUOjx2TzkSEoIAIR0RXgiu2jz-l2JE&s=10", version: "V1.5.7", weight: "1.1 GB", desc: "Simulación realista sin anuncios y con todas las rutas abiertas.", features: ["Full Desbloqueado", "Tanque Infinito", "Rutas Pro"] },
            { id: "trucker-europe-3", name: "Trucker of Europe 3", thumb: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1rjfLgFxiBAOozVIDrq0X6KmF92Wy56gGoj8e2ZM7Ocbw5_AQK4kpzgc&s=10", version: "V0.43.3", weight: "530 MB", desc: "Nivel máximo de conductor y garajes gratis en toda Europa.", features: ["Monedas Máximas", "Sin Daño", "Garajes Free"] }
        ];

        let darkMode = true;
        let selectedGame = null;

        // FUNCIONES DE UI (Ejecución Instantánea)
        window.renderGames = function() {
            const container = document.getElementById('game-list');
            container.innerHTML = gamesData.map(game => `
                <div class="game-card flex gap-3 p-3 rounded-[24px] border border-white/5 bg-[#11141b] shadow-md ${!darkMode ? 'bg-white border-black/5' : ''}">
                    <div class="relative flex-shrink-0">
                        <img src="${game.thumb}" class="w-[85px] h-[85px] object-cover rounded-2xl bg-gray-800" alt="${game.name}" loading="eager">
                        <span class="absolute -top-1 -right-1 bg-green-500 text-white text-[6px] font-black px-1.5 py-0.5 rounded shadow-lg border border-white/20 uppercase">UPDATE</span>
                        <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 bg-red-600 text-white text-[7px] font-black px-2 py-0.5 rounded-md whitespace-nowrap shadow-lg border border-white/10 uppercase">MOD APK</span>
                    </div>
                    <div class="flex-grow min-w-0 flex flex-col justify-between">
                        <div class="flex justify-between items-start">
                            <div class="min-w-0">
                                <h3 class="text-[12px] font-black uppercase truncate pr-2 ${darkMode ? 'text-white' : 'text-gray-800'}">${game.name}</h3>
                                <span class="text-[8px] font-black bg-green-500/10 text-green-500 px-2 py-0.5 rounded border border-green-500/20">${game.version}</span>
                            </div>
                            <button onclick="window.shareGame('${game.id}', '${game.name}')" class="p-2 rounded-xl transition-transform active:scale-90 ${darkMode ? 'bg-white/5 text-blue-500' : 'bg-gray-100 text-blue-600'}">
                                <i data-lucide="share-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                        <p class="text-[10px] leading-tight line-clamp-2 ${darkMode ? 'text-gray-400' : 'text-gray-500'}">${game.desc}</p>
                        <button onclick="window.openDetail('${game.id}')" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-2 rounded-xl text-[9px] font-black uppercase shadow-lg shadow-blue-600/20 active:scale-95 transition-transform mt-2">
                            DOWNLOAD MOD APK
                        </button>
                    </div>
                </div>
            `).join('');
            if(window.lucide) lucide.createIcons();
        };

        window.toggleTheme = function() {
            darkMode = !darkMode;
            document.body.style.backgroundColor = darkMode ? "#0a0c10" : "#f9fafb";
            document.body.className = darkMode ? "text-gray-100 min-h-screen" : "text-gray-900 min-h-screen bg-gray-50";
            document.getElementById('main-nav').className = `sticky top-0 z-50 backdrop-blur-md border-b py-3 px-4 ${darkMode ? 'border-white/5 bg-[#0a0c10]/80' : 'border-black/5 bg-white/80'}`;
            document.getElementById('main-footer').className = `py-10 px-4 border-t text-center ${darkMode ? 'border-white/5 bg-[#0a0c10]' : 'border-black/5 bg-gray-100'}`;
            
            const themeBtn = document.getElementById('theme-toggle-btn');
            themeBtn.className = `w-8 h-8 rounded-lg flex items-center justify-center transition-colors ${darkMode ? 'bg-white/5 text-blue-400' : 'bg-gray-200 text-blue-600'}`;
            themeBtn.innerHTML = darkMode ? '<i data-lucide="sun" class="w-4 h-4"></i>' : '<i data-lucide="moon" class="w-4 h-4"></i>';
            
            window.renderGames();
            if(selectedGame) window.updateDetailUI();
        };

        window.openDetail = function(id) {
            selectedGame = gamesData.find(g => g.id === id);
            window.updateDetailUI();
            document.getElementById('detail-overlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            if(window.setupFirebaseListeners) window.setupFirebaseListeners(id);
            lucide.createIcons();
        };

        window.closeDetail = function() {
            document.getElementById('detail-overlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
            selectedGame = null;
        };

        window.updateDetailUI = function() {
            if(!selectedGame) return;
            const overlay = document.getElementById('detail-overlay');
            overlay.className = `fixed inset-0 z-[100] overflow-y-auto ${darkMode ? 'bg-[#0a0c10]' : 'bg-gray-50'}`;
            
            document.getElementById('detail-name').innerText = selectedGame.name;
            document.getElementById('detail-name').style.color = darkMode ? "white" : "#111827";
            document.getElementById('detail-version').innerText = `VERSION ${selectedGame.version}`;
            document.getElementById('detail-thumb').src = selectedGame.thumb;
            document.getElementById('detail-weight').innerText = selectedGame.weight;
            
            document.getElementById('detail-features').innerHTML = selectedGame.features.map(f => `
                <div class="flex items-center gap-2 text-[10px] font-bold uppercase ${darkMode ? 'text-blue-400' : 'text-blue-600'}">
                    <i data-lucide="shield-check" class="w-3 h-3 text-green-500"></i> ${f}
                </div>
            `).join('');

            // Actualizar contenedores
            document.getElementById('detail-info-box').className = `p-5 rounded-3xl border transition-all flex flex-col gap-4 ${darkMode ? 'border-white/5 bg-white/5 text-blue-400' : 'border-black/5 bg-white shadow-sm text-blue-700'}`;
            document.getElementById('weight-section').className = `p-3 rounded-2xl flex items-center justify-between border ${darkMode ? 'bg-white/5 border-white/5' : 'bg-gray-50 border-black/5'}`;
            document.getElementById('comment-section-box').className = `p-5 rounded-3xl border ${darkMode ? 'border-white/5 bg-white/5' : 'border-black/5 bg-white shadow-sm'}`;
            document.getElementById('comment-input').className = `flex-grow text-[10px] p-3 rounded-2xl outline-none border ${darkMode ? 'border-white/10 bg-[#0a0c10] text-white focus:border-blue-500' : 'border-black/10 bg-gray-50 text-gray-900 focus:border-blue-600'}`;
            
            document.querySelectorAll('.download-btn').forEach(btn => {
                btn.className = `download-btn w-full flex items-center justify-between p-4 rounded-3xl border transition-colors ${darkMode ? 'border-white/5 bg-white/5' : 'border-black/5 bg-white shadow-sm'}`;
                btn.querySelector('.btn-title').style.color = darkMode ? "white" : "#111827";
            });

            document.getElementById('detail-back-btn').className = `absolute top-6 left-6 w-10 h-10 rounded-xl flex items-center justify-center z-50 backdrop-blur-sm ${darkMode ? 'bg-white/10 text-white' : 'bg-black/10 text-gray-800'}`;
            document.getElementById('detail-share-btn').className = `absolute top-6 right-6 w-10 h-10 rounded-xl flex items-center justify-center z-50 backdrop-blur-sm ${darkMode ? 'bg-white/10 text-white' : 'bg-black/10 text-gray-800'}`;
            
            document.getElementById('detail-share-btn').onclick = () => window.shareGame(selectedGame.id, selectedGame.name);
        };

        window.shareGame = async function(id, name) {
            const url = `${window.location.origin}${window.location.pathname}?g=${id}`;
            if (navigator.share) {
                navigator.share({ title: 'JoelDroid Mods', text: `Descarga ${name}`, url });
            } else {
                navigator.clipboard.writeText(url);
                const t = document.getElementById('toast-msg'); t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'), 2000);
            }
        };

        window.startDownload = function(label) {
            const l = document.getElementById('loading-overlay');
            document.getElementById('loading-msg').innerText = `Enlace de ${label}`;
            l.classList.remove('hidden'); setTimeout(()=>l.classList.add('hidden'), 2500);
        };

        // RENDERIZADO INICIAL (Antes de Firebase)
        window.renderGames();
        lucide.createIcons();
    </script>

    <!-- FIREBASE (Carga Asíncrona) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : { projectId: "joeldroid-mods" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'joeldroid-mods-yt';
        
        let currentUser = null;
        let activeUnsub = null;

        signInAnonymously(auth).then(() => {
            onAuthStateChanged(auth, u => {
                currentUser = u;
                // Si hay un ID en la URL, abrirlo tras el auth
                const g = new URLSearchParams(window.location.search).get('g');
                if(g && !selectedGame) window.openDetail(g);
            });
        });

        window.setupFirebaseListeners = function(gameId) {
            if(activeUnsub) activeUnsub();
            activeUnsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `comments_${gameId}`), (snap) => {
                const list = document.getElementById('comments-list');
                const comments = snap.docs.map(d => d.data()).sort((a,b) => (a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
                list.innerHTML = comments.map(c => `
                    <div class="p-3 rounded-2xl border border-white/5 bg-[#11141b] shadow-sm ${!darkMode ? 'bg-white border-black/5' : ''}">
                        <span class="text-[9px] font-black text-blue-500 uppercase block mb-1">${c.userName}</span>
                        <p class="text-[10px] leading-relaxed font-medium ${darkMode ? 'text-gray-300' : 'text-gray-700'}">${c.text}</p>
                    </div>
                `).join('') || '<p class="text-[9px] text-gray-500 italic text-center py-4">Sin comentarios aún...</p>';
            });
        };

        window.sendComment = async function() {
            const input = document.getElementById('comment-input');
            if(!input.value.trim() || !currentUser || !selectedGame) return;
            const text = input.value; input.value = "";
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `comments_${selectedGame.id}`), {
                    text, userId: currentUser.uid, userName: `User_${currentUser.uid.slice(0,5)}`, createdAt: serverTimestamp()
                });
            } catch(e) { input.value = text; }
        };
    </script>
</body>
</html>
