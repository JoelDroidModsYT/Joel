<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelDroid Mods YT | Premium Platform</title>
    
    <!-- Pre-conexión -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://unpkg.com">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --bg-color: #020408;
            --card-bg: rgba(13, 17, 23, 0.95);
            --text-main: #ffffff;
            --text-title: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(59, 130, 246, 0.3);
            --nav-bg: rgba(2, 4, 8, 0.98);
            --overlay-bg: #020408;
            --neon-glow: 0.5;
            --brand-color: #3b82f6;
            --neon-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            --premium-gradient: linear-gradient(to bottom right, #1d4ed8, #1e3a8a);
            --detail-name-color: #ffffff;
            --detail-name-shadow: 0 2px 10px rgba(255, 255, 255, 0.2);
            --warning-bg: rgba(245, 158, 11, 0.1);
            --warning-text: #f59e0b;
        }

        .light-mode {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-title: #1d4ed8;
            --text-muted: #475569;
            --border-color: rgba(37, 99, 235, 0.2);
            --nav-bg: rgba(255, 255, 255, 0.98);
            --overlay-bg: #f8fafc;
            --neon-glow: 0.3;
            --brand-color: #2563eb;
            --neon-shadow: 0 0 12px rgba(37, 99, 235, 0.2);
            --premium-gradient: linear-gradient(to bottom right, #2563eb, #1e40af);
            --detail-name-color: #1e3a8a; 
            --detail-name-shadow: none;
            --warning-bg: rgba(217, 119, 6, 0.08);
            --warning-text: #b45309;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.4s ease, color 0.4s ease; 
            overflow-x: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* FORMAS ARITMÉTICAS */
        .neon-background, .neon-background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .neon-background-overlay {
            z-index: 0;
            position: absolute;
        }

        .neon-shape {
            position: absolute;
            opacity: 0;
            animation: floatNeon 20s infinite linear;
            pointer-events: none;
        }

        .neon-shape.square { border: 2.5px solid; border-radius: 8px; }
        .neon-shape.circle { border: 2.5px solid; border-radius: 50%; }
        .neon-shape.hexagon {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            border: 2.5px solid;
            background: transparent;
        }

        @keyframes floatNeon {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: var(--neon-glow); }
            90% { opacity: var(--neon-glow); }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        #main-nav { 
            background-color: var(--nav-bg); 
            border-bottom: 2px solid var(--border-color); 
            box-shadow: var(--neon-shadow);
        }
        
        .brand-text {
            color: var(--brand-color);
            text-shadow: var(--neon-shadow);
        }
        
        .game-card { 
            background-color: var(--card-bg); 
            border: 2px solid var(--border-color); 
            box-shadow: var(--neon-shadow);
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .btn-download-premium {
            background: var(--premium-gradient);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px -5px rgba(29, 78, 216, 0.5);
        }

        .mod-badge { 
            background: #ef4444; 
            color: white; 
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.8); 
            font-size: 9px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 8px;
            z-index: 30;
            border: 1.5px solid rgba(255,255,255,0.3);
            line-height: 1;
            white-space: nowrap;
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .update-badge { 
            background: #10b981; 
            color: white; 
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.7); 
            font-size: 8px;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 6px;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.2);
            line-height: 1;
            position: absolute;
            top: -4px;
            right: -4px;
        }

        #detail-overlay { 
            background-color: var(--overlay-bg); 
            color: var(--text-main); 
        }

        .detail-content-wrapper {
            position: relative;
            z-index: 10;
        }

        #detail-name {
            color: var(--detail-name-color);
            transition: color 0.4s ease;
            text-shadow: var(--detail-name-shadow);
        }

        .box-premium { 
            background-color: var(--card-bg); 
            border: 2px solid var(--border-color);
            box-shadow: var(--neon-shadow);
        }

        .warning-box {
            background-color: var(--warning-bg);
            border-left: 4px solid var(--warning-text);
            color: var(--warning-text);
            font-size: 10px;
            line-height: 1.4;
            font-weight: 600;
            border-radius: 12px;
        }

        .btn-subtext {
            font-size: 8px;
            font-weight: 700;
            opacity: 0.8;
            display: block;
            margin-top: -2px;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="flex flex-col">

    <div class="neon-background" id="neon-bg-main"></div>

    <nav id="main-nav" class="sticky top-0 z-50 py-4 px-6">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div onclick="window.location.reload()" class="flex items-center gap-3 cursor-pointer active:scale-95 transition-transform">
                <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/40">
                    <i data-lucide="zap" class="w-6 h-6 text-white fill-current"></i>
                </div>
                <div>
                    <h1 class="brand-text text-base font-black tracking-tighter uppercase leading-none">JOELDROID</h1>
                    <span class="text-[8px] font-bold text-blue-500 tracking-[0.4em] uppercase opacity-80">MODS YT</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="window.toggleTheme()" class="w-11 h-11 rounded-2xl bg-gray-500/10 flex items-center justify-center text-blue-500 border-2 border-blue-500/30">
                    <i id="theme-icon" data-lucide="sun" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-5 py-8 flex-grow w-full z-10">
        <div id="home-banner" class="mb-10 p-8 rounded-[40px] bg-gradient-to-br from-blue-700 to-blue-900 text-white shadow-2xl relative overflow-hidden border-2 border-blue-400/30">
            <div class="relative z-10">
                <h2 class="font-black text-3xl uppercase leading-none mb-2 tracking-tighter">PREMIUM APKS</h2>
                <p class="text-[11px] opacity-90 font-medium">Contenido verificado por JoelDroid.</p>
            </div>
            <i data-lucide="layout-grid" class="absolute -right-12 -bottom-12 opacity-20 w-48 h-48 rotate-12"></i>
        </div>

        <div id="game-list" class="space-y-8"></div>
    </main>

    <footer class="max-w-md mx-auto w-full py-10 px-6 text-center z-10">
        <div class="w-full h-[2px] bg-gradient-to-r from-transparent via-[var(--border-color)] to-transparent mb-6"></div>
        <p class="footer-text text-[10px] font-black uppercase tracking-[0.3em] opacity-70">
            JOELDROID MODS YT &copy; 2026<br>
            <span class="text-[8px] opacity-50">TODOS LOS DERECHOS RESERVADOS</span>
        </p>
    </footer>

    <!-- DETALLE DEL JUEGO -->
    <div id="detail-overlay" class="fixed inset-0 z-[100] overflow-y-auto hidden">
        <div class="neon-background-overlay" id="neon-bg-overlay"></div>
        
        <div class="max-w-md mx-auto min-h-screen flex flex-col detail-content-wrapper">
            <div class="relative h-[320px] flex flex-col items-center justify-center p-8 text-center">
                <div class="absolute inset-0 bg-gradient-to-b from-blue-600/30 to-transparent"></div>
                
                <button onclick="window.goToHome()" class="absolute top-8 left-8 w-12 h-12 rounded-2xl flex items-center justify-center z-50 bg-blue-600 text-white border-2 border-blue-400 shadow-xl active:scale-90 transition-transform">
                    <i data-lucide="chevron-left" class="w-7 h-7"></i>
                </button>
                
                <div class="relative mt-4">
                    <img id="detail-thumb" src="" class="w-36 h-36 rounded-[50px] shadow-2xl border-4 border-white/20 object-cover relative z-10">
                    <div class="absolute inset-0 bg-blue-500 blur-[60px] opacity-40 scale-150"></div>
                </div>
                <h3 id="detail-name" class="font-black text-2xl uppercase mt-6 mb-2 tracking-tight drop-shadow-lg"></h3>
                <div class="flex gap-2">
                    <span id="detail-version" class="text-[9px] font-black bg-green-600 text-white px-4 py-1.5 rounded-xl shadow-lg tracking-widest uppercase"></span>
                    <span id="detail-weight" class="text-[9px] font-black bg-blue-600 text-white px-4 py-1.5 rounded-xl shadow-lg tracking-widest uppercase"></span>
                </div>
            </div>

            <div class="px-8 space-y-6 pb-16">
                <div class="box-premium p-8 rounded-[40px]">
                    <h4 class="text-[12px] font-black uppercase mb-6 flex items-center gap-2 text-blue-600">
                        <i data-lucide="cpu" class="w-5 h-5"></i> INFO DEL MOD
                    </h4>
                    <div id="detail-features" class="space-y-4"></div>
                </div>

                <!-- AVISO DE DESCARGA -->
                <div class="warning-box p-4 flex gap-3 items-start">
                    <i data-lucide="alert-triangle" class="w-5 h-5 shrink-0"></i>
                    <p>Si tienes problemas con la descarga del MOD 1 usa el enlace del MOD 2 haci usted tener una descarga segura.</p>
                </div>

                <div class="space-y-4">
                    <button class="w-full flex items-center justify-between p-6 rounded-[35px] text-white bg-blue-600 shadow-2xl shadow-blue-500/40 active:scale-95 transition-all">
                        <div class="flex items-center gap-5">
                            <i data-lucide="download-cloud" class="w-6 h-6"></i>
                            <div class="text-left">
                                <span class="font-black uppercase tracking-tight block">DOWNLOAD MOD 1</span>
                                <span class="btn-subtext">Descarga - Mediafire</span>
                            </div>
                        </div>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>

                    <button class="w-full flex items-center justify-between p-6 rounded-[35px] text-white bg-blue-700/80 border-2 border-blue-400/30 backdrop-blur-md shadow-2xl active:scale-95 transition-all">
                        <div class="flex items-center gap-5">
                            <i data-lucide="download-cloud" class="w-6 h-6"></i>
                            <div class="text-left">
                                <span class="font-black uppercase tracking-tight block">DOWNLOAD MOD 2</span>
                                <span class="btn-subtext">Descarga - Mediafire</span>
                            </div>
                        </div>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gamesData = [
            { 
                id: "global-truck", 
                name: "Global Truck Online", 
                thumb: "https://play-lh.googleusercontent.com/JJiHxM3IMImgKaROZ3U6yivclo5jxepBfZRShfCoxij7SrY233VKi_sp0YoxiWyHSfttjrgfYAy2vDVtYiaU5dw=w240-h480-rw", 
                version: "V0.9.1", 
                weight: "700 MB", 
                shortDesc: "Simulador de camiones con multijugador y físicas reales.", 
                features: ["Dinero Infinito", "Garaje Desbloqueado", "Anti-Ban"] 
            },
            { 
                id: "trucker-europe-3", 
                name: "Trucker of Europe 3", 
                thumb: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1rjfLgFxiBAOozVIDrq0X6KmF92Wy56gGoj8e2ZM7Ocbw5_AQK4kpzgc&s=10", 
                version: "V0.43.3", 
                weight: "530 MB", 
                shortDesc: "La mejor experiencia de transporte pesado en Europa.", 
                features: ["Free Shopping", "Combustible Infinito", "VIP Unlocked"] 
            },
            { 
                id: "bigrigs-sim", 
                name: "Truck Simulator Bigrigs", 
                thumb: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQd0ALg5YipsGER2CjBhltvbsAHovUOjx2TzkSEoIAIR0RXgiu2jz-l2JE&s=10", 
                version: "V1.5.7", 
                weight: "1.1 GB", 
                shortDesc: "Domina las carreteras americanas con camiones potentes.", 
                features: ["Todo Desbloqueado", "No Damage", "Premium Trucks"] 
            }
        ];

        let isDarkMode = true;

        // Función para establecer el modo según la hora del día
        function checkAutoTheme() {
            const hour = new Date().getHours();
            // Día: 6:00 AM a 6:00 PM (18:00)
            const isDayTime = hour >= 6 && hour < 18;
            setTheme(!isDayTime);
        }

        function setTheme(dark) {
            isDarkMode = dark;
            document.body.classList.toggle('light-mode', !isDarkMode);
            const themeIcon = document.getElementById('theme-icon');
            if (themeIcon) {
                themeIcon.setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            }
            if(window.lucide) lucide.createIcons();
        }

        function populateNeonBackground(containerId, count) {
            const container = document.getElementById(containerId);
            if(!container) return;
            container.innerHTML = '';
            const colors = ['#3b82f6', '#22c55e', '#f43f5e', '#a855f7'];
            const types = ['square', 'circle', 'hexagon'];

            for(let i=0; i<count; i++) {
                const shape = document.createElement('div');
                const type = types[Math.floor(Math.random() * types.length)];
                const color = colors[Math.floor(Math.random() * colors.length)];
                shape.className = `neon-shape ${type}`;
                shape.style.borderColor = color;
                shape.style.boxShadow = `0 0 12px ${color}`;
                const size = 30 + Math.random() * 45;
                shape.style.width = size + 'px';
                shape.style.height = size + 'px';
                shape.style.left = Math.random() * 95 + 'vw';
                shape.style.animationDuration = (12 + Math.random() * 15) + 's';
                shape.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(shape);
            }
        }

        window.renderGames = function() {
            const container = document.getElementById('game-list');
            container.innerHTML = gamesData.map(game => `
                <div class="game-card flex gap-5 p-5 rounded-[38px]">
                    <div class="shrink-0 relative w-24 h-24">
                        <img src="${game.thumb}" class="w-full h-full object-cover rounded-[30px] border-2 border-white/10 shadow-lg relative z-10">
                        <div class="update-badge">UPDATE</div>
                        <div class="mod-badge">MOD APK</div>
                    </div>
                    <div class="flex-grow flex flex-col justify-center min-w-0">
                        <h3 class="game-title text-[15px] uppercase truncate font-black tracking-tighter" style="color: var(--text-title)">${game.name}</h3>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[9px] font-black text-green-500">${game.version}</span>
                            <span class="text-[9px] font-black text-blue-500 uppercase">• PESO: ${game.weight}</span>
                        </div>
                        <p class="text-[11px] line-clamp-2 opacity-70" style="color: var(--text-muted)">${game.shortDesc}</p>
                        <button onclick="window.openDetailUI('${game.id}')" class="mt-4 w-full btn-download-premium py-2.5 rounded-2xl text-[9px] tracking-widest active:scale-95 transition-all">
                            DOWNLOAD MOD APK
                        </button>
                    </div>
                </div>
            `).join('');
            if(window.lucide) lucide.createIcons();
        };

        window.openDetailUI = function(id) {
            const game = gamesData.find(g => g.id === id);
            document.getElementById('detail-name').innerText = game.name;
            document.getElementById('detail-thumb').src = game.thumb;
            document.getElementById('detail-version').innerText = "VERSIÓN: " + game.version;
            document.getElementById('detail-weight').innerText = "PESO: " + game.weight;
            document.getElementById('detail-features').innerHTML = game.features.map(f => `
                <div class="flex items-center gap-3 p-4 rounded-2xl bg-blue-500/5 border border-blue-500/20">
                    <i data-lucide="check-circle-2" class="w-5 h-5 text-blue-500"></i>
                    <span class="text-[11px] font-bold uppercase tracking-tight text-current">${f}</span>
                </div>
            `).join('');
            
            document.getElementById('detail-overlay').classList.remove('hidden');
            populateNeonBackground('neon-bg-overlay', 15);
            if(window.lucide) lucide.createIcons();
        };

        window.goToHome = function() { 
            document.getElementById('detail-overlay').classList.add('hidden'); 
        };

        window.toggleTheme = function() {
            setTheme(!isDarkMode);
        };

        window.onload = () => { 
            checkAutoTheme(); // Carga automática según la hora
            populateNeonBackground('neon-bg-main', 25);
            window.renderGames(); 
        };
    </script>
</body>
</html>
